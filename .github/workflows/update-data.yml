name: Update market data

on:
  schedule:
    # Every 20 minutes, 13:00-21:00 UTC, Mon-Fri (covers US market hours incl. DST drift)
    - cron: '*/20 13-21 * * 1-5'
    # One end-of-day snapshot so the site carries the close overnight
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Carry the previous run's data forward so a ticker that fails one
      # fetch keeps serving its last good snapshot.
      - name: Restore previous data
        uses: actions/cache/restore@v4
        with:
          path: data
          key: market-data-${{ github.run_id }}
          restore-keys: market-data-

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch market data
        run: node scripts/fetch-data.mjs

      - name: Save data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data
          key: market-data-${{ github.run_id }}

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
